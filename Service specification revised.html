
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Request – Service Specification</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      margin: 20px;
      background-color: #ffffff;
    }

    .container {
      border: 1px solid #c2cbd3;
      border-radius: 2px;
      max-width: 1200px;
    }

    .main-header,
    .section-header {
      background-color: #1f4e79;
      color: #ffffff;
      padding: 6px 12px;
      font-weight: 600;
    }

    .section-header {
      font-size: 13px;
    }

    .table-wrapper {
      padding: 8px 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      padding: 4px 6px;
      border-bottom: 1px solid #e1e5ea;
      vertical-align: top;
      white-space: pre-wrap; /* ✅ preserve newlines */
    }

    thead th {
      background-color: #dde6f1;
      font-weight: 600;
      text-align: left;
    }

    .actions {
      padding: 8px 12px;
      border-top: 1px solid #c2cbd3;
      background-color: #f7f9fc;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      background-color: #e1e5ea;
      border: 1px solid #c2cbd3;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 2px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ccd2dc;
    }

    .band-link {
      color: #0066cc;
      text-decoration: underline;
      cursor: pointer;
    }

    .form-panel {
      border-top: 1px solid #c2cbd3;
      background-color: #f4f7fb;
      padding: 8px 12px 10px;
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }

    .required-star {
      color: #c00000;
    }

    .schedule-input-wrapper {
      display: flex;
      gap: 4px;
      align-items: stretch;
    }

    /* ✅ Schedule is now multiline */
    #schedule {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      font-size: 12px;
      padding: 4px;
      white-space: pre-wrap;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-dialog {
      background: #ffffff;
      border-radius: 3px;
      width: 760px;
      max-width: 95vw;
      max-height: 95vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      background-color: #1f4e79;
      color: #ffffff;
      padding: 6px 10px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .modal-body iframe {
      width: 100%;
      height: 520px;
      border: none;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="main-header">Service Request – Service Specification</div>

  <div class="section-header">Service specification</div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Select</th>
          <th>Active</th>
          <th>Service type</th>
          <th>Service Band Group</th>
          <th>Schedule</th>
          <th>Quantity</th>
          <th>Unit</th>
        </tr>
      </thead>
      <tbody id="specBody"></tbody>
    </table>
  </div>

  <div class="actions">
    <button id="btnAddRow">Add service</button>
  </div>

  <div class="form-panel" id="formPanel">
    <div class="form-grid">

      <label>Service Band Group<span class="required-star">*</span></label>
      <select id="bandGroup">
        <option value="">(select)</option>
        <option>Standard</option>
        <option>Medication Calls</option>
      </select>

      <label>Schedule<span class="required-star">*</span></label>
      <div class="schedule-input-wrapper">
        <textarea id="schedule" readonly></textarea>
        <button type="button" id="btnOpenScheduler">...</button>
      </div>

      <label>Quantity<span class="required-star">*</span></label>
      <input type="number" id="quantity" step="0.25">

      <label>Unit<span class="required-star">*</span></label>
      <select id="unit">
        <option value="">(select)</option>
        <option>Hours</option>
        <option>Days</option>
      </select>

    </div>
    <div class="actions">
      <button id="btnCancel">Cancel</button>
      <button id="btnApply">Save</button>
    </div>
  </div>
</div>

<!-- ✅ Scheduler Modal -->
<div class="modal-overlay" id="schedulerModal">
  <div class="modal-dialog">
    <div class="modal-header">
      <span>Schedule details</span>
      <button id="btnCloseScheduler">✕</button>
    </div>
    <div class="modal-body">
      <iframe id="schedulerFrame" src="Event scheduler revised.html"></iframe>
    </div>
  </div>
</div>

<script>
(function () {
  const scheduleInput = document.getElementById('schedule');
  const modal = document.getElementById('schedulerModal');

  document.getElementById('btnOpenScheduler').onclick = () => {
  modal.classList.add('active');
  const f = document.getElementById('schedulerFrame');
  if (f) {
    const base = f.getAttribute('src').split('?')[0];
    f.setAttribute('src', base + '?v=' + Date.now());
  }
};
  document.getElementById('btnCloseScheduler').onclick = () => modal.classList.remove('active');
  document.getElementById('btnCancel').onclick = () => modal.classList.remove('active');

  /* ✅ This receives the scheduler output INCLUDING Outcome line */
  window.receiveScheduleFromModal = function (scheduleText) {
  if (scheduleText) {
    let s = String(scheduleText).replace(/\r\n/g, '\n');
    // If Outcome is returned inline after a closing bracket, force it onto its own line
    s = s.replace(/\)\s*Outcome:/g, ')\n  Outcome:');
    // Add a blank line between task bullets (but keep header-to-first-bullet tight)
    s = s.replace(/\n\n•/g, '\n•');
    s = s.replace(/\n•/g, '\n\n•');
    s = s.replace(/:\n\n•/g, ':\n•');
    scheduleInput.value = s;
  } else {
    scheduleInput.value = '';
  }
  modal.classList.remove('active');
};
})();
</script>
</body>
</html>
