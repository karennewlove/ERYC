
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Scheduler</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      margin: 20px;
      background-color: #ffffff;
    }
    .scheduler-container {
      border: 1px solid #c2cbd3;
      border-radius: 2px;
      max-width: 700px;
    }
    .scheduler-header {
      background-color: #1f4e79;
      color: #ffffff;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 14px;
    }
    .scheduler-body {
      padding: 8px 12px 12px;
    }
    .section { margin-bottom: 8px; }
    .section-title { font-weight: 600; margin-bottom: 4px; }
    label { font-size: 12px; }
    .required-star { color: #c00000; }
    textarea {
      width: 100%;
      min-height: 40px;
      font-size: 12px;
    }
    .task-block {
      border: 1px solid #dde6f1;
      padding: 8px;
      margin-bottom: 8px;
      background-color: #f8fbff;
    }
    .task-header {
      font-weight: 600;
      margin-bottom: 4px;
      color: #1f4e79;
    }
  </style>
</head>

<body>
<div class="scheduler-container">
  <div class="scheduler-header">Event Scheduler</div>
  <div class="scheduler-body">

    <div class="section">
      <label>Start Date:</label>
      <input type="date" id="startDate">
      <label style="margin-left:20px;">Interval:</label>
      <input type="number" id="interval" value="1" min="1">
    </div>

    <div id="tasksContainer"></div>

    <div class="section" style="text-align:right;">
      <button id="btnAddTask">+</button>
      <button id="btnSave">Save</button>
    </div>
  </div>
</div>

<template id="taskTemplate">
  <div class="task-block">
    <div class="task-header"></div>

    <label>
      <input type="radio" class="schedTimeCritical"> Time critical
    </label>
    <label>
      <input type="radio" class="schedFlexible"> Flexible
    </label>

    <div>
      <label>Number of carers*</label>
      <input type="number" class="numCarers" min="1">
    </div>

    <div>
      <label>Days*</label><br>
      <label><input type="checkbox" class="day" value="Everyday"> Everyday</label>
      <label><input type="checkbox" class="day" value="Sun"> Sun</label>
      <label><input type="checkbox" class="day" value="Mon"> Mon</label>
      <label><input type="checkbox" class="day" value="Tue"> Tue</label>
      <label><input type="checkbox" class="day" value="Wed"> Wed</label>
      <label><input type="checkbox" class="day" value="Thu"> Thu</label>
      <label><input type="checkbox" class="day" value="Fri"> Fri</label>
      <label><input type="checkbox" class="day" value="Sat"> Sat</label>
    </div>

    <div>
      <label>Start time</label>
      <input type="time" class="startTime">
      <label>End time</label>
      <input type="time" class="endTime">
    </div>

    <div>
      <label>Duration (hours)</label>
      <input type="number" class="duration" step="0.25">
    </div>

    <div>
      <label>Outcome category*</label><br>
      <label><input type="checkbox" class="outcome" value="Personal Care"> Personal Care</label>
      <label><input type="checkbox" class="outcome" value="Medication"> Medication</label>
    </div>

    <div>
      <label>Outcome*</label>
      <textarea class="outcomeText"></textarea>
    </div>
  </div>
</template>

<script>
(function () {
  const tasksContainer = document.getElementById('tasksContainer');
  const template = document.getElementById('taskTemplate');
  const btnAddTask = document.getElementById('btnAddTask');
  const btnSave = document.getElementById('btnSave');
  let taskCount = 0;

  function addTask() {
    taskCount++;
    const clone = template.content.cloneNode(true);
    clone.querySelector('.task-header').textContent = 'Task ' + taskCount;
    tasksContainer.appendChild(clone);
  }

  function buildTaskSummary(block) {
    const days = [...block.querySelectorAll('.day:checked')].map(d => d.value).join('–');
    const carers = block.querySelector('.numCarers').value;
    const start = block.querySelector('.startTime').value;
    const end = block.querySelector('.endTime').value;
    const duration = block.querySelector('.duration').value;
    const outcomes = [...block.querySelectorAll('.outcome:checked')].map(o => o.value).join(', ');
    const outcomeText = block.querySelector('.outcomeText').value.trim().replace(/\s+/g, ' ');
    const isTimeCritical = block.querySelector('.schedTimeCritical').checked;

    let text = `${days} ${start} to ${end} (${duration} hours, ${carers} carers) – ${outcomes}`;
    text += isTimeCritical ? ' (Time-critical)' : ' (Flexible)';
    text += `\n  Outcome: ${outcomeText}`;
    return text;
  }

  btnAddTask.onclick = addTask;
  addTask();

  btnSave.onclick = function () {
    const startDate = document.getElementById('startDate').value;
    const interval = document.getElementById('interval').value || '1';
    const tasks = [...document.querySelectorAll('.task-block')];

    const taskSummaries = tasks.map(buildTaskSummary);

    const summary =
      `From ${startDate} every ${interval === '1' ? 'week' : interval + ' weeks'}:\n` +
      taskSummaries.map(t => '• ' + t).join('\n\n'); // ✅ WHITE LINE SPACING

    if (window.parent?.receiveScheduleFromModal) {
      window.parent.receiveScheduleFromModal(summary);
    } else {
      alert(summary);
    }
  };
})();
</script>
</body>
</html>
