
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Scheduler</title>
  <style>
    body{
      font-family:"Segoe UI",Arial,sans-serif;
      font-size:13px;
      margin:20px;
      background-color:#ffffff;
    }
    .scheduler-container{
      border:1px solid #c2cbd3;
      border-radius:2px;
      max-width:700px;
    }
    .scheduler-header{
      background-color:#1f4e79;
      color:#ffffff;
      padding:6px 12px;
      font-weight:600;
      font-size:14px;
    }
    .scheduler-body{
      padding:8px 12px 12px;
      background-color:#ffffff;
    }
    .section{ margin-bottom:8px; }
    .section-title{ font-weight:600; margin-bottom:4px; }
    label{ font-size:12px; }
    .required-star{ color:#c00000; margin-left:2px; }
    input[type="text"],
    input[type="number"],
    input[type="time"],
    input[type="date"],
    select,
    textarea{
      font-size:12px;
      padding:2px 4px;
      box-sizing:border-box;
    }
    input[type="number"]{ width:60px; }
    input[type="time"]{ width:90px; }
    textarea{
      width:100%;
      min-height:40px;
      resize:vertical;
    }
    .inline{
      display:inline-block;
      margin-right:12px;
      margin-bottom:4px;
    }
    .days-grid label,
    .period-grid label,
    .outcomes-grid label{
      display:inline-block;
      margin-right:10px;
      margin-bottom:4px;
      font-size:12px;
    }
    .small-label{
      font-size:11px;
      color:#555;
    }
    .actions{
      text-align:right;
      padding-top:6px;
      border-top:1px solid #c2cbd3;
      margin-top:10px;
    }
    button{
      background-color:#1f4e79;
      color:#ffffff;
      border:1px solid #163656;
      padding:4px 10px;
      font-size:12px;
      border-radius:2px;
      cursor:pointer;
      margin-left:6px;
    }
    button:hover{ background-color:#163656; }
    .error{
      color:#c00000;
      font-size:11px;
      margin-top:4px;
      display:none;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:4px;
      gap:8px;
    }
    .row label.inline-label{ min-width:140px; }
    .task-block{
      border:1px solid #dde6f1;
      padding:8px;
      margin-bottom:8px;
      background-color:#f8fbff;
    }
    .task-header{
      font-weight:600;
      margin-bottom:4px;
      color:#1f4e79;
    }
  </style>
</head>

<body>
  <div class="scheduler-container">
    <div class="scheduler-header">Event Scheduler</div>
    <div class="scheduler-body">
      <!-- Global Frequency / Dates -->
      <div class="section">
        <div class="row">
          <label class="inline-label">Frequency:</label>
          <span>Weekly</span>
          <label class="inline-label" style="margin-left:20px;">Interval:</label>
          <input type="number" id="interval" value="1" min="1">
        </div>
        <div class="row">
          <label class="inline-label">Start Date:</label>
          <input type="date" id="startDate">
          <label class="inline-label" style="margin-left:20px;">End Date:</label>
          <input type="date" id="endDate">
        </div>
      </div>

      <!-- Task boxes -->
      <div id="tasksContainer"></div>
      <div id="errorSummary" class="error"></div>

      <div class="actions">
        <button type="button" id="btnAddTask" title="Add another call">+</button>
        <button type="button" id="btnSave">Save</button>
      </div>
    </div>
  </div>

  <!-- template for each task -->
  <template id="taskTemplate">
    <div class="task-block">
      <div class="task-header"></div>

      <!-- Time critical / flexible / time and task -->
      <div class="section">
        <div class="row">
       
<label class="inline-label">
  Schedule type<span class="required-star">*</span>:
</label>



          <label class="inline">
            <input type="radio" class="schedTimeCritical" value="time_critical">
            Time critical
          </label>

          <label class="inline">
            <input type="radio" class="schedFlexible" value="flexible">
            Flexible
          </label>

          <label class="inline">
            <input type="radio" class="schedTimeAndTask" value="time_and_task">
            Time and task
          </label>
        </div>

        <div class="row">
          <label class="inline-label">
            Number of carers<span class="required-star">*</span>:
          </label>
          <input type="number" class="numCarers" min="1">
        </div>
      </div>

      <!-- Days -->
      <div class="section">
        <div class="section-title">
          Days of the week<span class="required-star">*</span>:
        </div>
        <div class="days-grid">
          <label><input type="checkbox" class="day-all"> All</label>
          <label><input type="checkbox" class="day" value="Everyday"> Everyday</label>
          <label><input type="checkbox" class="day" value="Sun"> Sun</label>
          <label><input type="checkbox" class="day" value="Mon"> Mon</label>
          <label><input type="checkbox" class="day" value="Tue"> Tues</label>
          <label><input type="checkbox" class="day" value="Wed"> Wed</label>
          <label><input type="checkbox" class="day" value="Thu"> Thur</label>
          <label><input type="checkbox" class="day" value="Fri"> Fri</label>
          <label><input type="checkbox" class="day" value="Sat"> Sat</label>
        </div>
      </div>

      <!-- Period (for flexible only) -->
      <div class="section periodSection" style="display:none;">
        <div class="section-title">Daily schedule period:</div>
        
<div class="period-grid">
  <label><input type="checkbox" value="Morning"> Morning</label>
  <label><input type="checkbox" value="Mid Morning"> Mid Morning</label>
  <label><input type="checkbox" value="Lunch"> Lunch</label>
  <label><input type="checkbox" value="Mid afternoon"> Mid afternoon</label>
  <label><input type="checkbox" value="Tea"> Tea</label>
  <label><input type="checkbox" value="Bedtime"> Bedtime</label>
  <label><input type="checkbox" value="Daily schedule arranged with person"> Daily schedule arranged with person</label>
</div>

        <div class="small-label">
          Only relevant for flexible / outcomes-based schedules.
        </div>
      </div>

      <!-- Times / Duration -->
      <div class="section">
        <div class="row timeRow">
          <label class="inline-label">
            Start time<span class="required-star">*</span>:
          </label>
          <input type="time" class="startTime">

          <label class="inline-label">
            End time<span class="required-star">*</span>:
          </label>
          <input type="time" class="endTime">
        </div>

        <div class="row">
          <label class="inline-label">
            Duration<span class="required-star">*</span>:
          </label>
          <input type="number" class="duration" min="0" step="0.25">
          <span class="small-label">(hours)</span>
        </div>

        <div class="small-label">
          • If <strong>Time critical</strong> is selected, Start and End time are required.<br>
          • If <strong>Flexible</strong> is selected, only Duration is required and times may be omitted.<br>
          • If <strong>Time and task</strong> is selected, Start and End time and Duration are required and Outcome text is not required.
        </div>
      </div>

      <!-- Outcome categories -->
      <div class="section">
        <div class="section-title">
          <span class="categoryLabel">Outcome category</span><span class="required-star">*</span>:
        </div>
        <div class="outcomes-grid">
          <label><input type="checkbox" class="outcome" value="Personal Care"> Personal Care</label>
          <label><input type="checkbox" class="outcome" value="Assistance with meals"> Assistance with meals</label>
          <label><input type="checkbox" class="outcome" value="Shopping"> Shopping</label>
          <label><input type="checkbox" class="outcome" value="Cleaning"> Cleaning</label>
          <label><input type="checkbox" class="outcome" value="Social isolation"> Social isolation</label>
          <label><input type="checkbox" class="outcome" value="Health appointment"> Health appointment</label>
          <label><input type="checkbox" class="outcome" value="Medication"> Medication</label>
        </div>
        <div class="small-label">
          System should validate that at least one outcome category is selected.
        </div>
      </div>

      <!-- Outcome text & Provider remarks -->
      <div class="section outcomeTextSection">
        <div class="section-title">
          Outcome<span class="required-star">*</span>:
        </div>
        <textarea class="outcomeText"></textarea>
      </div>

      <div class="section">
        <div class="section-title">Provider remarks:</div>
        <textarea class="providerRemarks"></textarea>
        <div class="small-label">
          Optional notes for internal use or providers.
        </div>
      </div>
    </div>
  </template>

  <script>
    (function () {
      const tasksContainer = document.getElementById('tasksContainer');
      const taskTemplate = document.getElementById('taskTemplate');
      const btnAddTask = document.getElementById('btnAddTask');
      const btnSave = document.getElementById('btnSave');
      const errorSummary = document.getElementById('errorSummary');
      const startDateInput = document.getElementById('startDate');
      const intervalInput = document.getElementById('interval');

      let taskCount = 0;

      function createTaskBlock(copyFromLast = false) {
        taskCount += 1;
        const clone = taskTemplate.content.firstElementChild.cloneNode(true);
        clone.querySelector('.task-header').textContent = 'Task ' + taskCount;

        const timeCriticalRadio = clone.querySelector('.schedTimeCritical');
        const flexibleRadio = clone.querySelector('.schedFlexible');
        const timeAndTaskRadio = clone.querySelector('.schedTimeAndTask');

        const numCarersInput = clone.querySelector('.numCarers');
        const dayAllCheckbox = clone.querySelector('.day-all');
        const everydayCheckbox = clone.querySelector('.day[value="Everyday"]');
        const dayCheckboxes = clone.querySelectorAll('.day:not([value="Everyday"])');

        const timeRow = clone.querySelector('.timeRow');
        const periodSection = clone.querySelector('.periodSection');

        const startTimeInput = clone.querySelector('.startTime');
        const endTimeInput = clone.querySelector('.endTime');
        const durationInput = clone.querySelector('.duration');

        const outcomeCheckboxes = clone.querySelectorAll('.outcome');
        const outcomeText = clone.querySelector('.outcomeText');
        const outcomeTextSection = clone.querySelector('.outcomeTextSection');
 const categoryLabel = clone.querySelector('.categoryLabel');
        const providerRemarks = clone.querySelector('.providerRemarks');

        const radioGroupName = 'schedType_' + taskCount;
        timeCriticalRadio.name = radioGroupName;
        flexibleRadio.name = radioGroupName;
        if (timeAndTaskRadio) timeAndTaskRadio.name = radioGroupName;

        function updateTimeAndPeriodModeForBlock() {
          const isFlexible = flexibleRadio.checked;
          const isTimeAndTask = timeAndTaskRadio && timeAndTaskRadio.checked;
 // Update category label depending on schedule type
 if (categoryLabel) {
   categoryLabel.textContent = isTimeAndTask ? 'Task category' : 'Outcome category';
 }

          if (isFlexible) {
            timeRow.style.display = 'none';
            periodSection.style.display = 'block';
            if (outcomeTextSection) outcomeTextSection.style.display = 'block';
          } else if (isTimeAndTask) {
            timeRow.style.display = 'flex';
            periodSection.style.display = 'none';
            if (outcomeTextSection) outcomeTextSection.style.display = 'none'; // hide Outcome text
          } else {
            // Time critical
            timeRow.style.display = 'flex';
            periodSection.style.display = 'none';
            if (outcomeTextSection) outcomeTextSection.style.display = 'block';
          }
        }

        timeCriticalRadio.addEventListener('change', updateTimeAndPeriodModeForBlock);
        flexibleRadio.addEventListener('change', updateTimeAndPeriodModeForBlock);
        if (timeAndTaskRadio) timeAndTaskRadio.addEventListener('change', updateTimeAndPeriodModeForBlock);
        updateTimeAndPeriodModeForBlock();

        // Everyday & All logic
        everydayCheckbox.addEventListener('change', function () {
          if (everydayCheckbox.checked) {
            dayCheckboxes.forEach(cb => cb.checked = false);
            dayAllCheckbox.checked = false;
          }
        });

        dayCheckboxes.forEach(cb => {
          cb.addEventListener('change', function () {
            if (cb.checked) everydayCheckbox.checked = false;
          });
        });

        dayAllCheckbox.addEventListener('change', function () {
          dayCheckboxes.forEach(cb => cb.checked = dayAllCheckbox.checked);
          everydayCheckbox.checked = false;
        });

        function getSelectedDaysForBlock() {
          if (everydayCheckbox.checked) return ['Everyday'];
          const selected = [];
          dayCheckboxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
          return selected;
        }
        clone.getSelectedDaysForBlock = getSelectedDaysForBlock;

        function getSelectedPeriodsForBlock() {
          const selected = [];
          const boxes = clone.querySelectorAll('.periodSection input[type=checkbox]');
          boxes.forEach(cb => { if (cb.checked) selected.push(cb.value); });
          return selected;
        }
        clone.getSelectedPeriodsForBlock = getSelectedPeriodsForBlock;

        // Copy values from last block if requested
        if (copyFromLast && tasksContainer.lastElementChild) {
          const last = tasksContainer.lastElementChild;

          function copyValue(selector, targetInput) {
            const src = last.querySelector(selector);
            if (src && targetInput) targetInput.value = src.value;
          }

          const lastTimeCritical = last.querySelector('.schedTimeCritical');
          const lastFlexible = last.querySelector('.schedFlexible');
          const lastTimeAndTask = last.querySelector('.schedTimeAndTask');

          if (lastTimeCritical && lastTimeCritical.checked) timeCriticalRadio.checked = true;
          if (lastFlexible && lastFlexible.checked) flexibleRadio.checked = true;
          if (lastTimeAndTask && lastTimeAndTask.checked && timeAndTaskRadio) timeAndTaskRadio.checked = true;

          copyValue('.numCarers', numCarersInput);
          copyValue('.startTime', startTimeInput);
          copyValue('.endTime', endTimeInput);
          copyValue('.duration', durationInput);
          copyValue('.outcomeText', outcomeText);
          copyValue('.providerRemarks', providerRemarks);

          const lastDayAll = last.querySelector('.day-all');
          if (lastDayAll && lastDayAll.checked) dayAllCheckbox.checked = true;

          const lastEveryday = last.querySelector('.day[value="Everyday"]');
          if (lastEveryday && lastEveryday.checked) everydayCheckbox.checked = true;

          const lastDays = last.querySelectorAll('.day:not([value="Everyday"])');
          lastDays.forEach((srcCb, idx) => {
            if (srcCb.checked && dayCheckboxes[idx]) dayCheckboxes[idx].checked = true;
          });

          const lastOutcomes = last.querySelectorAll('.outcome');
          lastOutcomes.forEach((srcCb, idx) => {
            if (srcCb.checked && outcomeCheckboxes[idx]) outcomeCheckboxes[idx].checked = true;
          });

          updateTimeAndPeriodModeForBlock();
        }

        tasksContainer.appendChild(clone);
      }

      function getTaskBlocks() {
        return Array.from(tasksContainer.querySelectorAll('.task-block'));
      }

      function validateAndBuildSummaryForBlock(block, index) {
        const errors = [];

        const timeCriticalRadio = block.querySelector('.schedTimeCritical');
        const flexibleRadio = block.querySelector('.schedFlexible');
        const timeAndTaskRadio = block.querySelector('.schedTimeAndTask');

        const numCarersInput = block.querySelector('.numCarers');
        const startTimeInput = block.querySelector('.startTime');
        const endTimeInput = block.querySelector('.endTime');
        const durationInput = block.querySelector('.duration');

        const outcomeCheckboxes = block.querySelectorAll('.outcome');
        const outcomeText = block.querySelector('.outcomeText');

        const isTimeCritical = timeCriticalRadio.checked;
        const isFlexible = flexibleRadio.checked;
        const isTimeAndTask = timeAndTaskRadio && timeAndTaskRadio.checked;
 // Update category label depending on schedule type
 if (categoryLabel) {
   categoryLabel.textContent = isTimeAndTask ? 'Task category' : 'Outcome category';
 }

        if (!isTimeCritical && !isFlexible && !isTimeAndTask) {
          errors.push(`Task ${index}: Select Time critical, Flexible, or Time and task.`);
        }

        if (!numCarersInput.value || Number(numCarersInput.value) < 1) {
          errors.push(`Task ${index}: Enter Number of carers (must be at least 1).`);
        }

        const getSelectedDaysForBlock = block.getSelectedDaysForBlock;
        const selectedDays = getSelectedDaysForBlock ? getSelectedDaysForBlock() : [];
        if (selectedDays.length === 0) {
          errors.push(`Task ${index}: Select at least one day of the week.`);
        }

        // Time critical + Time and task both require Start/End time
        if (isTimeCritical || isTimeAndTask) {
          if (!startTimeInput.value) {
            errors.push(`Task ${index}: Start time is required for this schedule type.`);
          }
          if (!endTimeInput.value) {
            errors.push(`Task ${index}: End time is required for this schedule type.`);
          }
        }

        if (!durationInput.value || Number(durationInput.value) <= 0) {
          errors.push(`Task ${index}: Duration (hours) is required and must be greater than 0.`);
        }

        const selectedOutcomes = [];
        outcomeCheckboxes.forEach(cb => { if (cb.checked) selectedOutcomes.push(cb.value); });
        if (selectedOutcomes.length === 0) {
          errors.push(`Task ${index}: Select at least one Outcome category.`);
        }

        // Outcome text required for Time critical & Flexible, NOT required for Time and task
        if (!isTimeAndTask && !outcomeText.value.trim()) {
          errors.push(`Task ${index}: Enter an Outcome description.`);
        }

        if (errors.length > 0) {
          return { ok: false, errors, summary: '' };
        }

        // Build summary (kept consistent with your existing output)
        let text = '';

        if (selectedDays.length > 0) {
          text += selectedDays.join('–');
        }

        if ((isTimeCritical || isTimeAndTask) && startTimeInput.value && endTimeInput.value) {
          text += ' ' + startTimeInput.value + ' to ' + endTimeInput.value;
        }

        if (durationInput.value) {
          text += ' (' + durationInput.value + ' hours';
          if (numCarersInput.value) {
            text += ', ' + numCarersInput.value + ' carers';
          }
          text += ')';
        } else if (numCarersInput.value) {
          text += ' (' + numCarersInput.value + ' carers)';
        }

        if (isFlexible) {
        const periods = block.getSelectedPeriodsForBlock ? block.getSelectedPeriodsForBlock() : [];
        if (periods.length > 0) {
          text += ' – ' + periods.join(', ');
        }
      }
      if (selectedOutcomes.length > 0) {
          text += ' – ' + selectedOutcomes.join(', ');
        }

        if (isTimeCritical) {
          text += ' (Time-critical)';
        } else if (isFlexible) {
          text += ' (Flexible)';
        } else if (isTimeAndTask) {
          text += ' (Time and task)';
        }

        return { ok: true, errors: [], summary: text };
      }

      // First block
      createTaskBlock(false);

      btnAddTask.addEventListener('click', function () {
        createTaskBlock(true);
      });

      btnSave.addEventListener('click', function () {
        const errors = [];
        const startDate = startDateInput.value;
        const interval = intervalInput.value || '1';

        if (!startDate) {
          errors.push('Start Date is required.');
        }

        const blocks = getTaskBlocks();
        const taskSummaries = [];

        blocks.forEach((block, i) => {
          const res = validateAndBuildSummaryForBlock(block, i + 1);
          if (!res.ok) {
            errors.push(...res.errors);
          } else {
            taskSummaries.push(res.summary);
          }
        });

        if (errors.length > 0) {
          errorSummary.innerHTML = errors.join('<br>');
          errorSummary.style.display = 'block';
          return;
        }

        errorSummary.style.display = 'none';

        let header = 'From ' + startDate;
        header += ' every ' + (interval === '1' ? 'week' : interval + ' weeks');

        const summary = header + ':\n' + taskSummaries.map(t => '• ' + t).join('\n');

        if (window.parent && typeof window.parent.receiveScheduleFromModal === 'function') {
          window.parent.receiveScheduleFromModal(summary);
        } else {
          alert('Schedule saved:\n' + summary);
        }
      });

    })();
  </script>
</body>
</html>
