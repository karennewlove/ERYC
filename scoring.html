<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provider Scoring</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      margin: 20px;
      background-color: #ffffff;
    }

    .scoring-container {
      border: 1px solid #c2cbd3;
      border-radius: 2px;
      overflow: hidden;
      max-width: 900px;
    }

    .scoring-header {
      background-color: #1f4e79; /* dark Azeus blue */
      color: #ffffff;
      padding: 6px 12px;
      font-weight: 600;
      font-size: 14px;
    }

    .scoring-toolbar {
      padding: 8px 12px;
      border-bottom: 1px solid #c2cbd3;
      background-color: #f4f7fb;
    }

    .scoring-toolbar label {
      font-weight: 600;
      margin-right: 6px;
    }

    .scoring-toolbar select {
      padding: 2px 4px;
      font-size: 13px;
    }

    .scoring-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .scoring-table th,
    .scoring-table td {
      padding: 4px 8px;
      border-bottom: 1px solid #e1e5ea;
      vertical-align: top;
    }

    .scoring-table thead th {
      background-color: #dde6f1;  /* light blue/grey header band */
      font-weight: 600;
      text-align: left;
    }

    .scoring-table tfoot td {
      font-weight: 600;
      border-top: 1px solid #c2cbd3;
      background-color: #f7f9fc;
    }

    .scoring-table input[type="text"],
    .scoring-table input[type="number"] {
      width: 80px;
      padding: 2px 4px;
      font-size: 12px;
      box-sizing: border-box;
    }

    .scoring-actions {
      padding: 8px 12px;
      text-align: right;
      background-color: #f7f9fc;
      border-top: 1px solid #c2cbd3;
    }

    .scoring-actions button {
      background-color: #1f4e79;
      color: #ffffff;
      border: none;
      padding: 4px 10px;
      font-size: 13px;
      border-radius: 2px;
      cursor: pointer;
    }

    .scoring-actions button:hover {
      background-color: #163656;
    }

    /* By default show closed framework rows */
    .step1-row[data-framework="closed"] { display: table-row; }
    .step1-row[data-framework="apl"]    { display: none; }
  </style>
</head>
<body>

  <div class="scoring-container" id="providerScoring">
    <div class="scoring-header">
      Provider scoring – from the bottom of the provider response page
    </div>

    <div class="scoring-toolbar">
      <label for="frameworkSelect">Select framework:</label>
      <select id="frameworkSelect">
        <option value="closed">Closed framework</option>
        <option value="apl">APL framework</option>
      </select>
    </div>

    <table class="scoring-table">
      <thead>
        <tr>
          <th style="width: 40%;">Step 1</th>
          <th style="width: 20%;">Score</th>
          <th style="width: 30%;">Step 2</th>
          <th style="width: 10%;">Score</th>
        </tr>
      </thead>
      <tbody>
        <!-- CLOSED FRAMEWORK FIELDS (default visible) -->
        <tr class="step1-row" data-framework="closed">
          <td>CQC Rating</td>
          <td><input type="text" readonly></td>
          <td>Start date</td>
          <td><input type="number"></td>
        </tr>
        <tr class="step1-row" data-framework="closed">
          <td>Performance</td>
          <td><input type="text" readonly></td>
          <td>SU Preferences</td>
          <td><input type="number"></td>
        </tr>
        <tr class="step1-row" data-framework="closed">
          <td>Contract Compliance</td>
          <td><input type="text" readonly></td>
          <td></td>
          <td></td>
        </tr>
        <tr class="step1-row" data-framework="closed">
          <td>Quality Assurance</td>
          <td><input type="text" readonly></td>
          <td></td>
          <td></td>
        </tr>

        <!-- APL FRAMEWORK FIELDS (hidden until chosen) -->
        <tr class="step1-row" data-framework="apl">
          <td>CQC Score</td>
          <td><input type="text" readonly></td>
          <td>Start date</td>
          <td><input type="number"></td>
        </tr>
        <tr class="step1-row" data-framework="apl">
          <td>Quality of Provision</td>
          <td><input type="text" readonly></td>
          <td>SU Preferences</td>
          <td><input type="number"></td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td>Total (Step 1)</td>
          <td><input type="text" readonly></td>
          <td>Total (Step 2)</td>
          <td><input type="text" readonly></td>
        </tr>
        <tr>
          <td colspan="3">Overall total</td>
          <td><input type="text" readonly></td>
        </tr>
      </tfoot>
    </table>

    <div class="scoring-actions">
      <button type="button">Calculate score</button>
    </div>
  </div>

  <script>
    (function () {
      var select   = document.getElementById('frameworkSelect');
      var scoring  = document.getElementById('providerScoring');
      var rows     = scoring.querySelectorAll('.step1-row');

      function updateRows() {
        var fw = select.value; // 'closed' or 'apl'
        rows.forEach(function (row) {
          if (row.getAttribute('data-framework') === fw) {
            row.style.display = 'table-row';
          } else {
            row.style.display = 'none';
          }
        });
      }

      select.addEventListener('change', updateRows);
      updateRows(); // ensure initial state matches dropdown
    })();
  </script>

</body>
</html>
